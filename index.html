// ─── CANVAS STARFIELD + SHOOTING STARS ──────────────────────────────────────

function initStarfield() {
  const canvas = document.getElementById('bgStars');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let W, H, raf;

  const stars = Array.from({length: 300}, () => ({
    x: Math.random(), y: Math.random(),
    r: Math.random() * 1.1 + 0.15,
    phase: Math.random() * Math.PI * 2,
    speed: Math.random() * 0.005 + 0.002,
  }));

  // Shooting stars pool
  const shoots = [];
  const spawnShoot = () => {
    shoots.push({
      x: Math.random() * W, y: Math.random() * H * 0.5,
      len: 80 + Math.random() * 120,
      speed: 8 + Math.random() * 8,
      angle: Math.PI / 6 + Math.random() * Math.PI / 8,
      life: 1, alpha: 0.7 + Math.random() * 0.3,
    });
  };
  let nextShoot = 3000 + Math.random() * 4000;

  const resize = () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; };
  resize();
  window.addEventListener('resize', resize);

  const draw = (t) => {
    ctx.clearRect(0, 0, W, H);
    // Ambient stars
    for (const s of stars) {
      const op = 0.1 + 0.2 * Math.sin(t * 0.001 * s.speed * 800 + s.phase);
      ctx.beginPath();
      ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180,200,240,${op})`;
      ctx.fill();
    }
    // Shooting stars
    if (t > nextShoot) { spawnShoot(); nextShoot = t + 4000 + Math.random() * 6000; }
    for (let i = shoots.length - 1; i >= 0; i--) {
      const s = shoots[i];
      const dx = Math.cos(s.angle) * s.len * s.life;
      const dy = Math.sin(s.angle) * s.len * s.life;
      const grad = ctx.createLinearGradient(s.x, s.y, s.x - dx, s.y - dy);
      grad.addColorStop(0, `rgba(220,230,255,${s.alpha * s.life})`);
      grad.addColorStop(1, 'rgba(220,230,255,0)');
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(s.x - dx, s.y - dy);
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      s.x += Math.cos(s.angle) * s.speed;
      s.y += Math.sin(s.angle) * s.speed;
      s.life -= 0.018;
      if (s.life <= 0) shoots.splice(i, 1);
    }
    raf = requestAnimationFrame(draw);
  };
  raf = requestAnimationFrame(draw);
  return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
}

          </radialGradient>
        </defs>

        <ellipse cx={960} cy={100} rx={420} ry={160} fill="url(#titleGlow)"
          style={{opacity: activeId ? 0 : 1, transition:'opacity 0.6s'}}/>

        {/* Title group — sits in SVG space, fades on zoom */}
        <g style={{opacity: activeId ? 0 : 1, transition:'opacity 0.5s', pointerEvents:'none'}}
           transform={`translate(${parallaxX * 0.4},${parallaxY * 0.4 - 30})`}>

          {/* Decorative stars flanking title */}
          {[{x:660,y:98,r:1.8},{x:700,y:120,r:1.2},{x:725,y:88,r:2.2},
            {x:1260,y:95,r:1.8},{x:1220,y:118,r:1.3},{x:1195,y:86,r:2.1},
            {x:820,y:68,r:1.0},{x:960,y:60,r:1.4},{x:1100,y:72,r:1.0}].map((s,i)=>(
            <circle key={i} cx={s.x} cy={s.y} r={s.r} fill="rgba(200,220,255,0.55)"/>
          ))}

          {/* Faint line ornaments */}
          <line x1={680} y1={106} x2={820} y2={106} stroke="rgba(127,179,245,0.18)" strokeWidth={0.7}/>
          <line x1={1100} y1={106} x2={1240} y2={106} stroke="rgba(127,179,245,0.18)" strokeWidth={0.7}/>
          <circle cx={820} cy={106} r={2} fill="rgba(127,179,245,0.35)"/>
          <circle cx={1100} cy={106} r={2} fill="rgba(127,179,245,0.35)"/>

          {/* "Data Science Portfolio" label */}
          <text x={960} y={74} textAnchor="middle"
            fill="#a8e6cf" fontSize={16} fontFamily="'Space Mono',monospace"
            letterSpacing="4" opacity={0.5}>PORTFOLIO</text>

          {/* Name */}
          <text x={960} y={150} textAnchor="middle"
            fill="rgba(232,236,248,0.94)" fontSize={82} fontFamily="'Space Grotesk',sans-serif"
            fontWeight={700} letterSpacing="-3"
            filter="url(#glow-projects)">Owen Keyt</text>

          {/* Tagline */}
          <text x={960} y={178} textAnchor="middle"
            fill="rgba(200,210,240,0.28)" fontSize={13} fontFamily="'Space Mono',monospace"
            letterSpacing="5">HOVER A CONSTELLATION · CLICK TO EXPLORE</text>

          {/* Internship badge */}
          <rect x={840} y={190} width={240} height={32} rx={3}
            fill="rgba(168,230,207,0.06)" stroke="rgba(168,230,207,0.2)" strokeWidth={0.8}/>
          <circle cx={858} cy={206} r={3.5} fill="#a8e6cf" opacity={0.85}/>
          <circle cx={858} cy={206} r={3.5} fill="#a8e6cf" opacity={0.25}>
            <animate attributeName="r" from="3.5" to="9" dur="2.2s" repeatCount="indefinite"/>
            <animate attributeName="opacity" from="0.3" to="0" dur="2.2s" repeatCount="indefinite"/>
          </circle>
          <text x={869} y={210} fill="rgba(168,230,207,0.7)" fontSize={11}
            fontFamily="'Space Mono',monospace" letterSpacing="1.5" dominantBaseline="middle">OPEN TO INTERNSHIPS 2027</text>
        </g>

        {/* Parallax group */}
        <g style={{transition:'transform 0.8s cubic-bezier(0.25,0.46,0.45,0.94)'}}
           transform={`translate(${parallaxX},${parallaxY})`}>

          {CONSTELLATIONS.map(c => {
            const isHovered = hoveredId===c.id;
            const isActive  = activeId===c.id;
            const isFaded   = activeId && activeId!==c.id;
            const groupOpacity = isFaded ? 0 : isHovered||isActive ? 1 : 0.32;

            const xs = c.stars.map(s=>s.x), ys = c.stars.map(s=>s.y);
            const ncx = (Math.min(...xs)+Math.max(...xs))/2;
            const ncy = (Math.min(...ys)+Math.max(...ys))/2;
            const labelX = ncx;
            const labelY = Math.min(...ys) - px(38);
            const nebulaR = Math.max(Math.max(...xs)-Math.min(...xs), Math.max(...ys)-Math.min(...ys)) * 0.7;

            return (
              <g key={c.id} style={{opacity:groupOpacity,transition:'opacity 0.45s'}}
                onMouseEnter={()=>{ if(!activeId) setHoveredId(c.id); }}
                onMouseLeave={()=>setHoveredId(null)}
                onClick={()=>{ if(!activeId) openConstellation(c); }}
                cursor={activeId===c.id?'default':activeId?'default':'pointer'}>

                {/* Nebula glow blob */}
                <ellipse cx={ncx} cy={ncy}
                  rx={nebulaR*1.3} ry={nebulaR}
                  fill={`url(#nebula-${c.id})`}
                  style={{
                    opacity: isHovered||isActive ? 1 : 0.5,
                    transition:'opacity 0.5s',
                    animation: isHovered||isActive ? 'nebulaDrift 6s ease-in-out infinite' : 'none',
                    transformOrigin:`${ncx}px ${ncy}px`,
                  }}
                />

                {/* Hit area */}
                {!isActive && (()=>{
                  const pad=px(70);
                  return <rect x={Math.min(...xs)-pad} y={Math.min(...ys)-pad}
                    width={Math.max(...xs)-Math.min(...xs)+pad*2}
                    height={Math.max(...ys)-Math.min(...ys)+pad*2} fill="transparent"/>;
                })()}

                {/* Lines */}
                {c.lines.map(([a,b],i)=>(
                  <line key={i}
                    x1={c.stars[a].x} y1={c.stars[a].y} x2={c.stars[b].x} y2={c.stars[b].y}
                    stroke={c.color}
                    strokeWidth={isHovered||isActive ? px(1.3) : px(0.75)}
                    strokeOpacity={isHovered||isActive ? 0.55 : tweaks.lineOpacity}
                    style={{transition:'stroke-width 0.3s,stroke-opacity 0.3s'}}
                  />
                ))}

                {/* Stars */}
                {c.stars.map(s => {
                  const isSel = activeStar?.id===s.id;
                  const starR = isActive ? s.r*1.6 : s.r;
                  const isBright = s.r===5;
                  return (
                    <g key={s.id}
                      cursor={isActive?'pointer':'inherit'}
                      onClick={isActive?(e)=>selectStar(s,e):undefined}
                      onMouseEnter={isActive?(e)=>{const el=e.currentTarget.querySelector('.mstar');if(el)el.setAttribute('r',s.r*2.2);}:undefined}
                      onMouseLeave={isActive?(e)=>{const el=e.currentTarget.querySelector('.mstar');if(el)el.setAttribute('r',s.r*1.6);}:undefined}>
                      {/* Ping ring on brightest star when hovered/active */}
                      {isBright && (isHovered||isActive) && (
                        <circle className="ping-ring" cx={s.x} cy={s.y} r={starR*1.5}
                          fill="none" stroke={c.color} strokeWidth={px(0.6)} opacity={0.5}
                          style={{transformOrigin:`${s.x}px ${s.y}px`}}
                        >
                          <animate attributeName="r" from={starR*1.2} to={starR*7} dur="2.6s" repeatCount="indefinite"/>
                          <animate attributeName="opacity" from="0.55" to="0" dur="2.6s" repeatCount="indefinite"/>
                        </circle>
                      )}
                      {/* Glow halo */}
                      {(isHovered||isActive) && (
                        <circle cx={s.x} cy={s.y} r={starR*3}
                          fill={c.color} opacity={isSel?0.24:0.09}
                          style={{transition:'opacity 0.3s'}}/>
                      )}
                      {/* Selected ring */}
                      {isSel && <circle cx={s.x} cy={s.y} r={starR*4} fill="none" stroke={c.color} strokeWidth={px(0.7)} opacity={0.45}/>}
                      {/* Core */}
                      <circle className="mstar" cx={s.x} cy={s.y} r={starR}
                        fill={isSel?c.color:'white'}
                        filter={isHovered||isActive?`url(#glow-${c.id})`:undefined}
                        style={{transition:'r 0.25s,fill 0.25s'}}/>
                      {/* Labels in active view */}
                      {isActive && <>
                        <text x={s.x} y={s.y-starR-px(10)} textAnchor="middle"
                          fill={isSel?c.color:'rgba(225,230,245,0.9)'}
                          fontSize={px(13)} fontFamily="'Space Grotesk',sans-serif" fontWeight="500"
                          style={{pointerEvents:'none',transition:'fill 0.2s'}}>{s.name}</text>
                        <text x={s.x} y={s.y-starR-px(22)} textAnchor="middle"
                          fill={c.color} fontSize={px(9)} fontFamily="'Space Mono',monospace"
                          opacity={0.5} style={{pointerEvents:'none'}}>{s.sub.split('·')[0].trim()}</text>
                      </>}
                    </g>
                  );
                })}

                {/* Name label */}
                {!isActive && (
                  <g style={{pointerEvents:'none'}}>
                    <text x={labelX} y={labelY} textAnchor="middle" fill={c.color}
                      fontSize={px(15)} fontFamily="'Space Grotesk',sans-serif" fontWeight={600}
                      letterSpacing={px(2)} opacity={isHovered?1:0.28}
                      style={{transition:'opacity 0.3s'}}>{c.name}</text>
                    {tweaks.showLatinNames && (
                      <text x={labelX} y={labelY+px(18)} textAnchor="middle" fill={c.color}
                        fontSize={px(9)} fontFamily="'Space Mono',monospace"
                        opacity={isHovered?0.45:0.1} style={{transition:'opacity 0.3s'}}>{c.latinName}</text>
                    )}
                  </g>
                )}
              </g>
            );
          })}
        </g>
      </svg>

      {/* Detail panel */}
      <div className={`detail-panel ${panelOpen?'open':''}`}>
        {activeStar && activeConst && <DetailPanel star={activeStar} constellation={activeConst} onClose={closePanel}/>}
      </div>

      {showTweaks && <TweaksPanel tweaks={tweaks} onChange={(k,v)=>{
        const n={...tweaks,[k]:v}; setTweaks(n);
        window.parent.postMessage({type:'__edit_mode_set_keys',edits:n},'*');
      }}/>}
    </div>
  );
}

// ─── DETAIL PANEL ────────────────────────────────────────────────────────────

function DetailPanel({star, constellation, onClose}) {
  return (
    <div style={{padding:'48px 36px 60px'}}>
      <button onClick={onClose} style={{position:'absolute',top:24,right:24,background:'none',border:'none',cursor:'pointer',color:'rgba(200,210,240,0.35)',fontSize:20,lineHeight:1,fontFamily:"'Space Mono',monospace",transition:'color 0.2s'}}
        onMouseEnter={e=>e.target.style.color='white'} onMouseLeave={e=>e.target.style.color='rgba(200,210,240,0.35)'}>✕</button>

      <div style={{fontSize:10,letterSpacing:'0.3em',color:constellation.color,opacity:0.6,textTransform:'uppercase',fontFamily:"'Space Mono',monospace",marginBottom:20}}>{constellation.name}</div>

      <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:22}}>
        <div style={{width:10,height:10,borderRadius:'50%',flexShrink:0,background:constellation.color,boxShadow:`0 0 12px 4px ${constellation.color}55`}}/>
        <h2 style={{fontSize:24,fontWeight:700,letterSpacing:'-0.02em',color:'rgba(232,236,248,0.95)',lineHeight:1.1}}>{star.name}</h2>
      </div>

      <div style={{fontSize:11,color:'rgba(200,210,240,0.4)',letterSpacing:'0.08em',fontFamily:"'Space Mono',monospace",marginBottom:26,paddingBottom:26,borderBottom:'1px solid rgba(255,255,255,0.06)'}}>{star.sub}</div>

      <p style={{fontSize:14,lineHeight:1.8,color:'rgba(200,215,245,0.68)',marginBottom:30}}>{star.body}</p>

      <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
        {star.tags.map(t=>(
          <span key={t} style={{padding:'5px 12px',borderRadius:2,background:`${constellation.color}12`,border:`1px solid ${constellation.color}28`,color:constellation.color,fontSize:11,fontFamily:"'Space Mono',monospace",letterSpacing:'0.05em'}}>{t}</span>
        ))}
      </div>
    </div>
  );
}

// ─── TWEAKS ──────────────────────────────────────────────────────────────────

function TweaksPanel({tweaks, onChange}) {
  return (
    <div style={{position:'fixed',bottom:24,right:24,zIndex:600,background:'rgba(8,10,22,0.97)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:6,padding:'20px 22px',width:260,backdropFilter:'blur(20px)',color:'rgba(200,210,240,0.8)',fontFamily:"'Space Grotesk',sans-serif",fontSize:13,boxShadow:'0 8px 40px rgba(0,0,0,0.5)',animation:'fadeUp 0.3s ease'}}>
      <div style={{fontWeight:600,marginBottom:16,letterSpacing:'0.08em',textTransform:'uppercase',fontSize:11,color:'rgba(200,210,240,0.45)'}}>Tweaks</div>
      <label style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <span>Line opacity</span>
        <input type="range" min="0.05" max="0.8" step="0.05" value={tweaks.lineOpacity}
          onChange={e=>onChange('lineOpacity',parseFloat(e.target.value))} style={{width:100,accentColor:'#7fb3f5'}}/>
      </label>
      <label style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <span>Latin names</span>
        <input type="checkbox" checked={tweaks.showLatinNames} onChange={e=>onChange('showLatinNames',e.target.checked)} style={{width:16,height:16,accentColor:'#7fb3f5',cursor:'pointer'}}/>
      </label>
      <label style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span>Bg tint</span>
        <input type="color" value={tweaks.bgTint} onChange={e=>{onChange('bgTint',e.target.value);document.body.style.background=e.target.value;}} style={{width:36,height:22,cursor:'pointer',border:'none',background:'none'}}/>
      </label>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
